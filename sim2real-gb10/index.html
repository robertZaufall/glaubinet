const fixes = [
  {
    number: "01",
    title: "torchcodec Versions Don’t Exist on ARM64",
    category: "Package availability",
    problem:
      "The first Docker build failed immediately. Inside docker/sim/Dockerfile, the workshop pinned torchcodec>=0.2.1,<0.6.0. That range exists on x86_64, but not on aarch64. ARM64 package history jumps directly from early 0.0.x releases to 0.11.x, so pip correctly reports that no matching distribution was found.",
    fix:
      "Update the dependency range to a version range that actually exists for ARM64.",
    whyItMatters:
      "This looked like a network or pip problem at first, but the versions literally never existed for ARM64.",
    codeLabel: "docker/sim/Dockerfile",
    code: [
      '- "torchcodec>=0.2.1,<0.6.0" \\',
      '+ "torchcodec>=0.11.0,<0.12.0" \\',
    ],
  },
  {
    number: "02",
    title: "pip Silently Replaced CUDA PyTorch with CPU PyTorch",
    category: "CUDA wheel preservation",
    problem:
      "The Docker image built successfully, but Isaac Sim crashed with CUDA initialization errors. Torch could no longer see the GPU. The base Isaac Lab container already included an NVIDIA CUDA-enabled PyTorch build, but the Dockerfile pinned torch==2.7.0. On aarch64, pip installed the CPU-only wheel from PyPI and silently replaced the GPU build because the version technically matched.",
    fix:
      "Capture the exact installed torch and torchvision versions from the base image so the NVIDIA-provided CUDA-enabled builds are preserved.",
    whyItMatters:
      "There were no warnings and no obvious install errors — just broken CUDA at runtime.",
    codeLabel: "constraints generation",
    code: [
      "RUN printf '%s\\n' \\",
      '    "packaging==23.0" \\',
      '    "numpy==1.26.0" \\',
      '    "lxml==4.9.4" \\',
      '-   "torch==2.7.0" \\',
      '-   "torchvision==0.22.0" \\',
      '+   "torch==$($PYTHON -c \'import torch; print(torch.__version__)\')" \\',
      '+   "torchvision==$($PYTHON -c \'import torchvision; print(torchvision.__version__)\')" \\',
      '    "imageio==2.37.0" \\',
      "    > /tmp/constraints.txt",
    ],
  },
  {
    number: "03",
    title: "triton==3.3.1 Doesn’t Exist for ARM64",
    category: "Unsupported dependency strip",
    problem:
      "While building the real robot container, docker/real/Dockerfile.blackwell failed because triton==3.3.1 does not exist for aarch64. Only newer Triton versions are published for ARM64.",
    fix:
      "Add Triton to the existing sed-based removal list for unsupported packages.",
    whyItMatters:
      "This is safe in this setup because Triton is later bundled through the PyTorch nightly CUDA build anyway.",
    codeLabel: "docker/real/Dockerfile.blackwell",
    code: [
      "sed -i '/flash-attn==/d' pyproject.toml && \\",
      "+ sed -i '/triton==3.3.1/d' pyproject.toml && \\",
    ],
  },
  {
    number: "04",
    title: "Static TLS Exhaustion",
    category: "Dynamic linker limits",
    problem:
      "The container built correctly and Python launched correctly. Then Isaac Sim started loading extensions and failed with libgomp.so.1: cannot allocate memory in static TLS block, followed by many Omniverse extension failures. On ARM64, the dynamic linker allocates a fixed-size static TLS region at process startup. Isaac Sim loads enough libraries — PyTorch, USD, PhysX, Hydra, OpenMP, Omniverse extensions, and CUDA runtime libraries — to exhaust that region.",
    fix:
      "Preload libgomp so it gets TLS allocation early, and expand available optional static TLS space with GLIBC_TUNABLES.",
    whyItMatters:
      "The error message gives very little indication of the actual fix. On x86_64 this rarely appears because defaults are typically larger.",
    codeLabel: "Docker run environment",
    code: [
      "-e LD_PRELOAD=/usr/lib/aarch64-linux-gnu/libgomp.so.1",
      "-e GLIBC_TUNABLES=glibc.rtld.optional_static_tls=2048",
    ],
    table: [
      ["LD_PRELOAD", "Loads libgomp first so it gets TLS allocation early"],
      ["GLIBC_TUNABLES", "Expands available static TLS space"],
    ],
    callout:
      "If you see cannot allocate memory in static TLS block on ARM64, this is likely the solution.",
  },
  {
    number: "05",
    title: "Docker Volume Mount Path Was Wrong",
    category: "Workspace mount verification",
    problem:
      "The workshop documentation referenced ~/sim2real/Sim-to-Real-SO-101-Workshop/, but the actual repository lived at ~/Sim-to-Real-SO-101-Workshop/. The container started normally, but the workspace inside the container was empty: no scripts, no source code, and no entrypoints.",
    fix:
      "Correct the host mount path so the real repository is mounted into the container workspace.",
    whyItMatters:
      "A container can start successfully even when the workspace mount points to the wrong empty path. Always verify mounted directories actually contain what you expect.",
    codeLabel: "docker volume mount",
    code: [
      "- -v ~/sim2real/Sim-to-Real-SO-101-Workshop:/workspace/Sim-to-Real-SO-101-Workshop",

    problem:

    fix:
      "Create a Python 3.10 environment, clone Isaac-GR00T, install the bundled ARM64 torchcodec wheel from scripts/deployment/dgpu/wheels/, then install GR00T in editable mode.",
    whyItMatters:
      "The solution is hidden in the repository itself: a prebuilt ARM64 wheel ships inside scripts/deployment/dgpu/wheels/.",
    codeLabel: "Isaac GR00T setup",
    code: [
      "# Create Python 3.10 environment",
      "conda create -n gr00t python=3.10 -y",

      "",
      "# Clone repository",
      "git clone https://github.com/NVIDIA/Isaac-GR00T.git",

      "",
      "# Install bundled wheel",
      "pip install scripts/deployment/dgpu/wheels/torchcodec-0.10.0a0-cp310-cp310-linux_aarch64.whl",
      "",
      "# Install GR00T",
      "pip install -e .",
    ],
  },
];

              <h2 className="mt-2 text-3xl font-semibold tracking-tight text-white">Every issue and exact remediation</h2>
            </div>
            <Badge className="w-fit border-emerald-400/40 bg-emerald-400/10 text-emerald-200 hover:bg-emerald-400/20">6 fixes</Badge>
          </div>

          {fixes.map((fix) => (
            <Card key={fix.number} className="overflow-hidden rounded-3xl border-slate-800 bg-slate-900/80 text-slate-100 shadow-xl shadow-black/20">
              <CardContent className="grid gap-6 p-6 lg:grid-cols-[0.72fr_1.28fr] lg:p-8">
                <div className="space-y-4">
                  <div className="flex items-center gap-3">
                    <InlineGlyph label={fix.number} className="h-12 w-12 text-emerald-300" />
                    <Badge className="border-slate-700 bg-slate-950 text-slate-300 hover:bg-slate-900">{fix.category}</Badge>
                  </div>
                  <h3 className="text-2xl font-semibold tracking-tight text-white">{fix.title}</h3>
                  <div className="space-y-3 text-sm leading-6 text-slate-300">
                    <p><span className="font-semibold text-rose-200">Problem:</span> {fix.problem}</p>
                    <p><span className="font-semibold text-emerald-200">Fix:</span> {fix.fix}</p>
                    <p><span className="font-semibold text-blue-200">Why it mattered:</span> {fix.whyItMatters}</p>
                  </div>
                </div>
                <div className="space-y-4">
                  <CodeBlock label={fix.codeLabel} lines={fix.code} />
                  {fix.table ? <MiniTable rows={fix.table} /> : null}
                  {fix.callout ? <div className="rounded-2xl border border-amber-300/30 bg-amber-300/10 p-4 text-sm leading-6 text-amber-100">{fix.callout}</div> : null}
                </div>
              </CardContent>
            </Card>
          ))}
        </div>
      </section>

      <section className="px-6 pb-10 sm:px-10 lg:px-16">
        <div className="mx-auto max-w-7xl">
          <Card className="rounded-3xl border-slate-800 bg-slate-900/80 text-slate-100 shadow-xl shadow-black/20">
            <CardHeader>
              <SectionLabel>Static TLS detail</SectionLabel>
              <CardTitle className="text-2xl">Why the libgomp failure cascaded</CardTitle>
            </CardHeader>
            <CardContent className="space-y-5 text-slate-300">
              <p className="leading-8">On ARM64, the dynamic linker allocates a fixed-size static TLS region at process startup. Every shared library using thread-local variables consumes part of this region. Isaac Sim loads a massive number of libraries, eventually filling the region.</p>
              <div className="grid gap-3 sm:grid-cols-2 lg:grid-cols-4">
                {tlsLibraries.map((library) => (
                  <div key={library} className="rounded-2xl border border-slate-800 bg-slate-950/70 px-4 py-3 text-sm text-slate-300">{library}</div>
                ))}
              </div>
              <div className="rounded-2xl border border-rose-400/20 bg-rose-400/10 p-4 font-mono text-sm text-rose-100">libgomp.so.1: cannot allocate memory in static TLS block</div>
            </CardContent>
          </Card>
        </div>
      </section>

      <section className="px-6 pb-10 sm:px-10 lg:px-16">
        <div className="mx-auto max-w-7xl">
          <Card className="overflow-hidden rounded-3xl border-emerald-400/20 bg-gradient-to-br from-emerald-400/15 via-slate-900 to-blue-500/10 text-slate-100 shadow-2xl shadow-black/30">
            <CardHeader>
              <SectionLabel>Complete launcher</SectionLabel>
              <CardTitle className="text-3xl">Final run_teleop.sh with all ARM64 fixes applied</CardTitle>
            </CardHeader>
            <CardContent>
              <CodeBlock label="run_teleop.sh" lines={runTeleopScript} />
            </CardContent>
          </Card>
        </div>
      </section>

      <section className="px-6 pb-10 sm:px-10 lg:px-16">
        <div className="mx-auto max-w-7xl space-y-6">
          <div>
            <SectionLabel>Key takeaways</SectionLabel>
            <h2 className="mt-2 text-3xl font-semibold tracking-tight text-white">What to expect when bringing SO-101 to ARM64 Blackwell systems</h2>
          </div>
          <div className="grid gap-4 md:grid-cols-2">
            {takeaways.map((takeaway, index) => (
              <Card key={takeaway.title} className="rounded-3xl border-slate-800 bg-slate-900/80 text-slate-100 shadow-xl shadow-black/20">
                <CardContent className="space-y-4 p-6">
                  <InlineGlyph label={`${index + 1}`} className="h-10 w-10 text-emerald-300" />
                  <h3 className="text-xl font-semibold text-white">{takeaway.title}</h3>
                  <p className="leading-7 text-slate-300">{takeaway.text}</p>
                </CardContent>
              </Card>
            ))}
          </div>
        </div>
      </section>

      <section className="px-6 pb-10 sm:px-10 lg:px-16">
        <div className="mx-auto grid max-w-7xl gap-6 lg:grid-cols-[0.85fr_1.15fr]">
          <Card className="rounded-3xl border-slate-800 bg-slate-900/80 text-slate-100 shadow-xl shadow-black/20">
            <CardHeader>
              <SectionLabel>GB10 after the fixes</SectionLabel>
              <CardTitle className="text-2xl">Why it is compelling</CardTitle>
            </CardHeader>
            <CardContent className="grid gap-3">
              {platformHighlights.map((item) => (
                <div key={item} className="rounded-2xl border border-emerald-400/20 bg-emerald-400/10 px-4 py-3 text-emerald-100">{item}</div>
              ))}
            </CardContent>
          </Card>

          <Card className="rounded-3xl border-slate-800 bg-slate-900/80 text-slate-100 shadow-xl shadow-black/20">
            <CardHeader>
              <SectionLabel>Final thoughts</SectionLabel>
              <CardTitle className="text-2xl">The bottleneck is ecosystem friction</CardTitle>
            </CardHeader>
            <CardContent className="space-y-4 text-base leading-8 text-slate-300">
              {finalThoughts.map((thought) => <p key={thought}>{thought}</p>)}
            </CardContent>
          </Card>
        </div>
      </section>

      <section className="px-6 pb-16 sm:px-10 lg:px-16">
        <div className="mx-auto max-w-7xl rounded-3xl border border-slate-800 bg-slate-900/70 p-6 text-sm text-slate-400 shadow-xl shadow-black/20">
          <p className="mb-3 font-semibold uppercase tracking-[0.22em] text-slate-300">Content integrity checks</p>
          <div className="grid gap-3 sm:grid-cols-2 lg:grid-cols-3">
            {testCases.map((test) => (
              <div key={test.name} className="flex items-center justify-between gap-4 rounded-2xl border border-slate-800 bg-slate-950/70 px-4 py-3">
                <span>{test.name}</span>
                <span className={test.pass ? "text-emerald-300" : "text-rose-300"}>{test.pass ? "pass" : "fail"}</span>
              </div>
            ))}
          </div>
        </div>
      </section>

      <footer className="border-t border-white/10 bg-slate-950 px-6 py-8 sm:px-10 lg:px-16">
        <div className="mx-auto flex max-w-7xl flex-col gap-3 text-sm leading-6 text-slate-400 sm:flex-row sm:items-center sm:justify-between">
          <p>{article.workshopName} · {article.qualifier}</p>
          <p>All details are rendered from the complete Markdown article supplied in this conversation.</p>
        </div>
      </footer>
    </main>
  );
}


    ReactDOM.createRoot(document.getElementById('root')).render(<SimToRealSo101WorkshopCanvas />);
  </script>
</body>
</html>
